<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VirtualAP</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="container">

    <header class="header">
      <div class="header-title">
        <h1>Virtual<span class="accent">AP</span></h1>
        <p class="subtitle">Your phone, an actual router</p>
      </div>
      <div id="status-pill" class="pill pill-off">STOPPED</div>
    </header>

    <!-- Status card -->
    <section class="card" id="status-card" hidden>
      <h2>Status</h2>
      <div class="stat-grid">
        <div class="stat"><span class="stat-label">Gateway</span><span class="stat-value" id="st-gateway">—</span></div>
        <div class="stat"><span class="stat-label">SSID</span><span class="stat-value" id="st-ssid">—</span></div>
        <div class="stat"><span class="stat-label">Band / Channel</span><span class="stat-value" id="st-band">—</span></div>
        <div class="stat"><span class="stat-label">Upstream</span><span class="stat-value" id="st-upstream">—</span></div>
        <div class="stat"><span class="stat-label">Clients</span><span class="stat-value" id="st-clients">—</span></div>
        <div class="stat"><span class="stat-label">Since</span><span class="stat-value" id="st-started">—</span></div>
      </div>
      <div id="leases-wrap" hidden>
        <h3>Connected clients</h3>
        <ul id="leases-list" class="leases"></ul>
      </div>
    </section>

    <!-- Config card -->
    <section class="card">
      <h2>Access Point</h2>

      <label class="field">
        <span>SSID</span>
        <input type="text" id="cfg-ssid" placeholder="My VirtualAP" maxlength="32" autocomplete="off">
      </label>

      <label class="field">
        <span>Password <small>(min 8 characters)</small></span>
        <div class="input-row">
          <input type="password" id="cfg-pass" placeholder="••••••••" autocomplete="off">
          <button type="button" class="btn-icon" id="toggle-pass" aria-label="Show password">👁</button>
        </div>
      </label>

      <div class="field-row">
        <label class="field">
          <span>Band</span>
          <select id="cfg-band">
            <option value="2" selected>2.4 GHz</option>
            <option value="5">5 GHz</option>
          </select>
        </label>
        <label class="field">
          <span>Channel</span>
          <select id="cfg-channel">
            <option value="" selected>Auto (follow STA)</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span>Upstream <small>(internet source — pick wg0 for a WireGuard hotspot)</small></span>
        <div class="input-row">
          <select id="cfg-upstream">
            <option value="auto" selected>Auto (recommended)</option>
          </select>
          <button type="button" class="btn-icon" id="refresh-ifaces" aria-label="Refresh interfaces">↻</button>
        </div>
      </label>

      <button id="btn-toggle" class="btn btn-primary">Start Access Point</button>
      <p id="action-msg" class="action-msg" hidden></p>
    </section>

    <!-- Settings card -->
    <section class="card">
      <h2>Settings</h2>
      <label class="switch-row">
        <span>Run at boot</span>
        <input type="checkbox" id="cfg-boot" class="switch">
      </label>
    </section>

    <!-- Logs card -->
    <section class="card">
      <div class="card-head">
        <h2>Logs</h2>
        <button type="button" class="btn-icon" id="refresh-logs" aria-label="Refresh logs">↻</button>
      </div>
      <pre id="log-view" class="logs">No logs yet.</pre>
    </section>

    <footer class="footer">VirtualAP · by ravindu644</footer>
  </main>

  <script src="assets/command-executor.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
